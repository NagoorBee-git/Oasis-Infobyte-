<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url('https://images.unsplash.com/photo-1557683316-973673baf926?w=1600&auto=format&fit=crop&q=80');
background-size:cover;
background-position:center;
background-attachment:fixed;
position:relative;
}

body::before{
content:'';
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
background:linear-gradient(135deg,rgba(252,231,243,0.85),rgba(219,234,254,0.85));
z-index:-1;
}

.container{
width:620px;
padding:35px;
border-radius:16px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(15px);
box-shadow:0 20px 40px rgba(0,0,0,0.1);
color:#374151;
position:relative;
z-index:1;
border:1px solid rgba(255,255,255,0.8);
}

header{
text-align:center;
margin-bottom:25px;
}

header h1{
font-weight:600;
letter-spacing:1px;
color:#1f2937;
}

header p{
font-size:13px;
opacity:0.8;
color:#6b7280;
}

.input-section{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border:2px solid #e0e7ff;
border-radius:8px;
outline:none;
font-size:14px;
background:rgba(255,255,255,0.9);
transition:all 0.3s ease;
color:#374151;
}

input:focus{
border-color:#a5b4fc;
box-shadow:0 0 0 3px rgba(165,180,252,0.1);
}

input::placeholder{
color:#9ca3af;
}

.add-btn{
background:linear-gradient(135deg,#a5b4fc,#c7d2fe);
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
color:#4338ca;
font-weight:500;
transition:0.3s;
box-shadow:0 4px 15px rgba(165,180,252,0.2);
}

.add-btn:hover{
transform:scale(1.05);
box-shadow:0 6px 20px rgba(165,180,252,0.3);
background:linear-gradient(135deg,#818cf8,#a5b4fc);
}

.section{
margin-top:20px;
}

.section h3{
margin-bottom:6px;
color:#1f2937;
}

.counter{
font-size:12px;
opacity:0.8;
margin-bottom:6px;
color:#6b7280;
}

ul{
list-style:none;
}

li{
background:rgba(255,255,255,0.7);
backdrop-filter:blur(10px);
padding:12px;
border-radius:10px;
margin-bottom:10px;
display:flex;
flex-direction:column;
transition:0.25s;
border:1px solid rgba(255,255,255,0.8);
color:#374151;
}

li:hover{
transform:translateY(-3px);
box-shadow:0 6px 15px rgba(0,0,0,0.08);
background:rgba(255,255,255,0.85);
}

.task-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.task-text{
font-size:14px;
color:#374151;
}

.completed{
text-decoration:line-through;
opacity:0.6;
color:#9ca3af;
}

.time{
font-size:11px;
opacity:0.7;
margin-top:4px;
color:#6b7280;
}

.actions button{
margin-left:6px;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
transition:0.2s;
}

.complete{background:linear-gradient(135deg,#86efac,#bbf7d0);color:#166534;}
.edit{background:linear-gradient(135deg,#fde68a,#fef3c7);color:#92400e;}
.delete{background:linear-gradient(135deg,#fca5a5,#fecaca);color:#991b1b;}

.complete:hover{transform:scale(1.1);box-shadow:0 4px 12px rgba(134,239,172,0.3);}
.edit:hover{transform:scale(1.1);box-shadow:0 4px 12px rgba(253,230,138,0.3);}
.delete:hover{transform:scale(1.1);box-shadow:0 4px 12px rgba(252,165,165,0.3);}

</style>
</head>

<body>

<div class="container">

<header>
<h1>TaskFlow Pro</h1>
<p>Organize your daily productivity</p>
</header>

<div class="input-section">
<input id="taskInput" placeholder="Add a new task...">
<button class="add-btn" onclick="addTask()">Add</button>
</div>

<div class="section">
<div class="counter" id="pendingCount"></div>
<h3>Pending Tasks</h3>
<ul id="pending"></ul>
</div>

<div class="section">
<div class="counter" id="completedCount"></div>
<h3>Completed Tasks</h3>
<ul id="completed"></ul>
</div>

</div>

<script>

const input=document.getElementById("taskInput");
const pending=document.getElementById("pending");
const completed=document.getElementById("completed");

input.addEventListener("keypress",function(e){
if(e.key==="Enter"){
addTask();
}
});

function updateCounters(){
document.getElementById("pendingCount").innerText=
pending.children.length+" tasks pending";

document.getElementById("completedCount").innerText=
completed.children.length+" tasks completed";
}

function saveData(){
localStorage.setItem("pendingTasks",pending.innerHTML);
localStorage.setItem("completedTasks",completed.innerHTML);
}

function loadData(){
pending.innerHTML=localStorage.getItem("pendingTasks")||"";
completed.innerHTML=localStorage.getItem("completedTasks")||"";
updateCounters();
}

function addTask(){

let text=input.value.trim();

if(text===""){
alert("Please enter a task");
return;
}

let li=document.createElement("li");

let time=new Date().toLocaleString();

li.innerHTML=`

<div class="task-row">

<span class="task-text">${text}</span>

<div class="actions">
<button class="complete" onclick="completeTask(this)">✔</button>
<button class="edit" onclick="editTask(this)">✏</button>
<button class="delete" onclick="deleteTask(this)">🗑</button>
</div>

</div>

<div class="time">Added: ${time}</div>

`;

pending.appendChild(li);

input.value="";

updateCounters();
saveData();

}

function completeTask(btn){

let li=btn.closest("li");

li.querySelector(".task-text").classList.add("completed");

completed.appendChild(li);

updateCounters();
saveData();

}

function deleteTask(btn){

btn.closest("li").remove();

updateCounters();
saveData();

}

function editTask(btn){

let task=btn.closest("li").querySelector(".task-text");

let newText=prompt("Edit task",task.innerText);

if(newText && newText.trim()!==""){
task.innerText=newText;
saveData();
}

}

loadData();

</script>

</body>
</html>
